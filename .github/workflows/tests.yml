# Offline unit-test suite. Deliberately references NO secrets: ANTHROPIC_API_KEY
# does not exist in this job, so tests cannot make an authenticated API call
# even if every in-suite guard failed.
name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest
