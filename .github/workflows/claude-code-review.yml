name: Claude Code Review

on:
  pull_request:
    # `edited` fires when a PR's base branch changes (e.g. a stacked PR
    # auto-retargeting to main after its parent merges). GitHub dismisses the
    # standing approval on retarget ("The base branch was changed."), so the
    # review must re-run then — the job-level guard below skips the
    # title/body-only edits that also arrive as `edited`.
    types: [opened, synchronize, ready_for_review, reopened, edited]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Fork PRs can't access secrets/OIDC on the pull_request trigger, so the
    # review can't authenticate and the job always fails. Skip them here; forks
    # are reviewed on demand via an `@claude` comment (see claude.yml) instead.
    # For `edited` events, only run when the base branch changed (the payload's
    # `changes.base` is present only then) — not on title/body edits.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.action != 'edited' || github.event.changes.base != null)

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Also review commits pushed by bots (e.g. a fix pushed by claude[bot]).
          # Without this the action rejects bot-initiated runs. Narrow to specific
          # bot names instead of '*' if you want to restrict which bots trigger it.
          allowed_bots: "*"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. The PR branch is already checked out in the
            current working directory. Use `gh pr diff` to see the changes.

            Focus on high-signal problems in the changed code only:
            - Bugs, logic errors, and unhandled edge cases
            - Security issues
            - Clear violations of guidelines in any relevant CLAUDE.md (root or a
              CLAUDE.md in a parent directory of the changed file)

            Skip nitpicks, style preferences, and pre-existing issues.

            Leave feedback with `mcp__github_inline_comment__create_inline_comment`
            for each specific issue (one comment per issue, on the relevant line).

            Then submit ONE formal review verdict for PR
            #${{ github.event.pull_request.number }} with `gh pr review`:
            - If you found significant issues, run `gh pr review
              ${{ github.event.pull_request.number }} --request-changes --body "<brief summary>"`.
            - If the changes look correct and you found no significant issues, run
              `gh pr review ${{ github.event.pull_request.number }} --approve --body "<brief summary>"`.
            - If you are unsure or the PR is out of scope to judge, run `gh pr review
              ${{ github.event.pull_request.number }} --comment --body "<brief summary>"`.
            Never merge the PR; a human decides whether to merge.
          # The action denies comment-posting tools by default; grant the inline
          # comment tool plus the gh subcommands the review needs, or it reviews
          # but cannot post its findings.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

