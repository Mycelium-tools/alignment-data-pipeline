name: CI

# The `smoke` job is the required merge-gate check: it proves dependencies
# install, the code byte-compiles, and the offline test suite passes. It
# references no secrets (ANTHROPIC_API_KEY does not exist in this job, so the
# tests cannot make an authenticated API call even if every in-suite guard
# failed) and therefore runs on fork PRs too — unlike the Claude review.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile (syntax check)
        run: python -m compileall -q shared sdf_pipeline dad_pipeline pref_pipeline evals viewer

      - name: Run offline test suite
        run: pytest
