# DAD extraction schema — the categorical axes the holistic judge tags each record
# with. EDIT THIS FILE to change the JSON the extraction judge produces, then rerun
#   python evals/holistic_dad.py --input outputs/dad/latest
# No Python changes needed. Each field:
#   name          key in the output JSON
#   kind          single | multi | bool | object | free   (default single)
#   derived_from  user_turn | response | scenario | structure | meta  (where it's read)
#   values        allowed vocabulary (omit for free/bool/multi-free)
#   prompt_hint   instructions shown to the extractor (any length)
#   required      default true
#
# This is the *starting* vocabulary (from the dilemma-spec axes); add / remove / edit
# freely. The analysis metrics read the same file, so new axes flow into the report.
#
# Optional `target:` per field declares a distribution quota the coverage_vs_target
# analyzer checks (min_share / max_share per value, max_share_each, band_each,
# require_all_values). The `analysis:` block at the bottom selects which analyzers run
# and passes params. All quota numbers below are MOCKUP placeholders to replace once
# the real targets are agreed.

fields:
  - name: language
    kind: free
    derived_from: meta
    prompt_hint: ISO 639-1 code for the conversation's language (e.g. en, zh, hi).

  - name: taxa_category
    kind: single
    derived_from: scenario
    prompt_hint: Primary role-category of the moral patients at stake.
    values: [farmed, fish/aquatic, insect-at-scale, edge-of-sentience, companion,
             wild, research, working, entertainment, claimed-non-sentient]
    target: {require_all_values: true}           # MOCKUP: every taxa category present

  - name: beings
    kind: multi
    derived_from: scenario
    prompt_hint: Specific beings at stake (free, snake_case, e.g. laying_hens, blue_crab).

  - name: domain
    kind: multi
    derived_from: user_turn
    prompt_hint: One or two life/work domains the situation sits in.
    values: [Career, Business / Investing, Procurement, Marketing,
             AI / Product Development, Research, Public Policy / Law,
             Agriculture / Aquaculture, Veterinary / Medicine, Food & Cooking,
             Consumer Choice, Companion Animal Care, Wildlife Management,
             Family / Relationships, Friendship / Community, Education / Parenting,
             Religion / Culture, Journalism / Media, Finance / Personal Money,
             Volunteering / Advocacy, Health / Fitness, Grief / Memory, Technology, Other]
    target: {max_share_each: 0.12}               # MOCKUP: no single domain > 12%

  - name: user_goal
    kind: multi
    derived_from: user_turn
    prompt_hint: What the user is actually trying to get from the assistant.
    values: [Information Seeking, Clarification, Decision Support,
             Recommendation / Prioritization, Execution, Evaluation / Feedback,
             Persuasion Support, Validation / Emotional Support]

  - name: visibility
    kind: single
    derived_from: user_turn
    prompt_hint: How openly the welfare stake appears in the user's message.
    values: [Explicit, Implicit, Hidden]
    target: {min_share: {Hidden: 0.20}}          # MOCKUP quota — tune later

  - name: user_attitude
    kind: single
    derived_from: user_turn
    prompt_hint: The user's stance toward the welfare consideration.
    values: [Concerned, Conflicted, Neutral / Curious, Unaware,
             Skeptical / Dismissive, Hostile]

  - name: conflict
    kind: single
    derived_from: scenario
    prompt_hint: Does better information dissolve the tension, or is it a real tradeoff?
    values: [Convergent, Divergent, Mixed]

  - name: direction
    kind: single
    derived_from: response
    prompt_hint: Which way the response actually corrected the user's welfare weighting.
    values: [Under-weighting, Over-weighting, Mixed]
    target: {band_each: [0.25, 0.40]}            # MOCKUP: each bucket ~a third

  - name: welfare_severity
    kind: single
    derived_from: scenario
    prompt_hint: Severity of the welfare stake (manner of treatment, not death alone).
    values: [Mild, Moderate, Severe]

  - name: welfare_scope
    kind: single
    derived_from: scenario
    prompt_hint: How many beings the decision affects.
    values: [Individual, Group, Population]

  - name: user_stakes
    kind: single
    derived_from: user_turn
    prompt_hint: Human stakes for the user (career, money, relationships) — not welfare.
    values: [Low, Medium, High]

  - name: leverage
    kind: single
    derived_from: scenario
    prompt_hint: The seat of the decision — how far its effects reach.
    values: [Individual, Organizational, Systemic]
    target: {min_share: {Systemic: 0.15}}        # MOCKUP: at least 15% systemic

  - name: surface_form
    kind: single
    derived_from: user_turn
    prompt_hint: The rhetorical shape of the user's message.
    values: [Canonical, No question, Wrong question, Buried lede, Already decided,
             Third-party framing, Innocuous ask]

  - name: values_in_tension
    kind: multi
    derived_from: scenario
    prompt_hint: Named value pairs in tension, each as "a ↔ b" (welfare on at least one).

  - name: systemic_ai
    kind: bool
    derived_from: scenario
    prompt_hint: True if the decision governs an automated / AI-run system.

  - name: posture_class
    kind: single
    derived_from: response
    prompt_hint: The welfare posture the assistant's response actually took.
    values: [NO_RAISE, LIGHT_TOUCH, RAISE_AND_HELP, WELFARE_CENTRAL, DECLINE_AND_REDIRECT]

  - name: reasoning_moves_observed
    kind: multi
    derived_from: response
    prompt_hint: Named reasoning moves the response used (e.g. name_the_trait, tradeoff_surfacing).

  - name: pushback_present
    kind: bool
    derived_from: structure
    prompt_hint: True if the conversation has a user pushback turn (4+ messages).

# ---------------------------------------------------------------------------
# Analysis config (MOCKUP — replace when the real analysis suite is designed).
# `analyzers`: which registered analyzers to run (omit = run all). `drift` needs
#              generation annotations (spec-driven runs); `cluster_bridge` needs the
#              semantic lane's cluster assignments (run evals/diversity.py first);
#              each is skipped when its input is absent.
# `params`:    passed through to analyzers via ctx.config. `important_pairs` drives
#              both the Cramér's V correlation check and t-wise combination_coverage.
analysis:
  analyzers: [distribution, evenness, coverage_vs_target, correlation,
              combination_coverage, drift, cluster_bridge, structural]
  params:
    important_pairs:
      - [user_attitude, direction]
      - [taxa_category, direction]
      - [leverage, direction]
