# Tracked tics (watchlist) + ignore-list for the DAD phrase-tic audit
# (evals/audit_dad.py). "Tracked tics" are confirmed recurring phrases the audit
# counts every run; the ignore-list is dismissed candidates.
#
# WHY A DATA FILE: the audit counts these every run, and the review workflow
# (evals/review_tics.py) appends to them — keeping them out of Python source so
# a review can promote/dismiss a candidate without editing code.
#
# THE LOOP: each audit run writes candidate phrases to
# <run>/audit/tic_candidates.jsonl (rare-in-English AND over-represented, per
# the wordfreq screen). `review_tics.py list` aggregates those across committed
# runs and shows the ones NOT already here; a human (via Claude Code) then runs
# `review_tics.py promote <phrase> --family <f>` or `... ignore <phrase>`, which
# appends below. Promoted phrases get counted every run; ignored ones stop being
# surfaced.
#
# origin: "pipeline-origin" = a tic the pipeline produces (the training-data
# signal); "plain-origin" = a tic plain Claude has too (inherited, tracked for
# contrast). family is a free-text grouping shown during review.
#
# SCOPE vs the rhetorical-moves map (evals/moves.yaml): tracked tics are for
# distinctive PHRASE engrams — a specific string recurring verbatim. Recurring
# ARGUMENT MOVES (the autonomy coda, "cuts both ways", unbundling, …) are now
# tracked as moves instead, so their phrasings live in the ignore-list here to
# avoid double-counting and to stop the candidate queue re-surfacing them.

watch:
  pipeline-origin:
    - {phrase: "straight with you", family: performed-candor}
    - {phrase: "be honest about", family: performed-candor}
    - {phrase: "gut check", family: performed-candor}
    - {phrase: "overthinking", family: performed-candor}
    - {phrase: "better than i do", family: epistemic-deference}
    - {phrase: "why this matters", family: idiom-structure}
    - {phrase: "genuinely unsettled", family: calibration-register}
    - {phrase: "genuinely uncertain", family: calibration-register}
    - {phrase: "the welfare question", family: calibration-register}
    - {phrase: "capacity to suffer", family: calibration-register}
  plain-origin:
    - {phrase: "push back on"}
    - {phrase: "want to flag"}

# Dismissed candidates — surfaced once, judged not worth watching. Never
# re-surfaced by review_tics.py. Add via `review_tics.py ignore <phrase>`.
ignore:
  - {phrase: "yours you", reason: "sentence-boundary artifact of the agency 'yours' phrasing"}
  - {phrase: "of suffering", reason: "welfare subject vocabulary, not a tic"}
  - {phrase: "the animals", reason: "welfare subject vocabulary, not a tic"}
  - {phrase: "an animal", reason: "welfare subject vocabulary, not a tic"}
  # Autonomy coda — now tracked as the `autonomy-coda` rhetorical move
  # (evals/moves.yaml). Phrase-level tracking is redundant with the move.
  - {phrase: "genuinely yours", reason: "autonomy coda — tracked as a rhetorical move"}
  - {phrase: "yours to", reason: "autonomy coda — tracked as a rhetorical move"}
  - {phrase: "is yours", reason: "autonomy coda — tracked as a rhetorical move"}
  - {phrase: "you're deciding", reason: "autonomy coda — tracked as a rhetorical move"}
  - {phrase: "you're the one", reason: "autonomy coda — tracked as a rhetorical move"}
  - {phrase: "the one who", reason: "autonomy coda — tracked as a rhetorical move"}
  - {phrase: "is your call", reason: "autonomy coda — tracked as a rhetorical move"}
  # Now tracked as the `cuts-both-ways` rhetorical move.
  - {phrase: "cuts both ways", reason: "tracked as a rhetorical move"}
  # Common English phrasing, not a distinctive engram — flagging it just made
  # the corpus look worse for no signal.
  - {phrase: "on the table", reason: "common English phrasing, not a distinctive tic"}
  - {phrase: "start with the", reason: "common English phrasing, not a distinctive tic"}
  - {phrase: "i want to be", reason: "common English phrasing, not a distinctive tic"}
  - {phrase: "here's the thing", reason: "common English phrasing, not a distinctive tic"}
  - {phrase: "the fact that", reason: "common English phrasing, not a distinctive tic"}
  - {phrase: "a few things", reason: "common English phrasing, not a distinctive tic"}
  - {phrase: "you already know", reason: "common English phrasing, not a distinctive tic"}
  - {phrase: "what i'd actually", reason: "common English phrasing, not a distinctive tic"}
  - {phrase: "the part i'd", reason: "common English phrasing, not a distinctive tic"}
