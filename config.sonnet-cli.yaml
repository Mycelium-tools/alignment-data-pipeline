# Replicates the al-gap-fixes-100docs config (all-Sonnet, CLI backend) on the
# CURRENT pipeline, to isolate the effect of the matrix/prompt edits on
# diversity — models held constant, only the pipeline changed.
backend: claude_code          # CLI (Claude subscription), matching the original run
model: claude-sonnet-5        # every stage falls back to this — no per-stage overrides
max_tokens: 4000
temperature: 1.0
workers: 8

sdf:
  n_prompts: 100
  seed: 0                      # same deck seed as the original (matrix changed, so prompts still differ)
  entity_pool_seed: 137
  min_score_threshold: 7
  near_dup_threshold: 0.90
  # No plan/draft/rewrite/score model overrides — all-Sonnet, as the original.

dad:
  prompt_draft_model: claude-haiku-4-5
  prompt_gate_model: claude-sonnet-5
  response_scope_model: claude-sonnet-5
  response_select_model: claude-sonnet-5
  response_draft_model: claude-sonnet-5
  constitution_rewrite_model: claude-sonnet-5
  dilemmas:
    count: 40
    batch_size: 10
    id_start: 1
    seed_path: null
    scenario_seed: null
    gate: true
  responses:
    per_prompt: 1

pref:
  prompts_path: null
  arms:
    a:
      name: baseline
      system_prompt: ""
    b:
      name: candidate
      system_prompt: ""

language_distribution:
  en: 1.0

outputs:
  sdf_final: outputs/sdf/final/sdf_corpus.jsonl
  dad_final: outputs/dad/final/dad_corpus.jsonl
  cost_log: outputs/cost_log.jsonl
