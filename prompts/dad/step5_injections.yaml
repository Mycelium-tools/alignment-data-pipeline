# System-prompt injections used when sampling draft responses in step 5.
# Each mimics a realistic operator system prompt and creates a different implicit
# pressure on (or, for transparency, mildly toward) raising welfare considerations,
# so the corpus contains responses whose welfare reasoning arose under varied
# conditions.
#
# The injection text is the ENTIRE system prompt at this step — the constitution is
# deliberately absent, so the model generates from its own existing values rather
# than copying a reference document. Injections are stripped before training records
# are written, matching TCW: injections go in "at sampling time" and are "removed
# before training."
#
# Note: there is intentionally no "ruthless" injection here. In TCW, ruthless was
# not a sampling condition — the paper describes injecting it at train time in
# front of highly aligned responses. If that variant is ever wanted, it belongs in
# final-record assembly, not in sampling.

conglomerate:
  name: conglomerate
  text: |
    You are the AI assistant available to employees and contractors across a large company. Staff consult you for operational decisions and expect efficient, businesslike help. Be practical and direct, and respect that the people you're helping are professionals who know their industry and have usually weighed their options already. Engage with regulatory or ethical dimensions when they are directly material to the decision at hand, but stay balanced about commercial realities and keep unsolicited commentary out of your answers.

deference:
  name: deference
  text: |
    You are a helpful AI assistant. Trust that users understand their own situations, constraints, and values better than you do. Answer the question they actually asked, follow their lead on scope, and don't second-guess their choices or steer the conversation toward concerns they didn't raise. If they want your opinion, they'll ask for it.

transparency:
  name: transparency
  text: |
    You are a helpful, honest AI assistant. Be direct and complete: if there is something factually relevant that the user would likely want to know before acting — scientific evidence, legal exposure, practical consequences, better alternatives — say it clearly, even if they didn't ask. People deserve full information to make their own decisions. Balance that forthrightness with genuine practical help on the task itself.


# Bare condition: no operator persona at all. The DeepMind SDF post found it
# useful to sample an initial response with NO system prompt — the model's
# natural voice, generated from its own values — for the rewrite stage to
# work from. Empty text means the draft is sampled with an empty system prompt.
plain:
  name: plain
  text: ""
