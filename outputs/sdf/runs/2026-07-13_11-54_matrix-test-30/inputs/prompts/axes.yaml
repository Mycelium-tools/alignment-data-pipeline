# SDF combinatorial prompt matrix — single source of truth for every axis,
# weight, and compatibility map read by sdf_pipeline/layer1_matrix.py.
#
# Axis contents are transcribed from context_docs/diversity_axis_matrix.md
# ("Diversity Axis Matrix & Prompt-Generation Spec") — edit the spec first,
# then mirror here. Document-type weights are target corpus shares calibrated
# to the WebOrganizer/DCLM format taxonomy of a filtered web crawl plus
# curated sources (see the plan document's §1 sources); they are educated
# estimates, not published figures.
#
# Design rule: compatibility lives HERE, not in code. Adding a domain, being,
# document type, or writer is a YAML edit; the sampler validates every
# cross-reference at load time and fails loudly before any drawing happens.

version: 1

# --- Corpus role mix -------------------------------------------------------
# The two AI-facing roles (ai-character + constitution-identity) carry the
# identity channel; welfare-topic supplies the background world of evidence
# and discourse.
role_mix:
  ai-character: 0.45
  constitution-identity: 0.23
  welfare-topic: 0.32

# NOTE: the corpus is all-welfare-positive by policy — there is no lacks-skill
# slice (no dismissive or preachy author documents) and no AI stance where
# welfare is absent or loses. This corpus is a small slice of the training
# mix; the negative/neutral space is abundantly covered by the rest of it.

# --- Document types (axis 3A.1, weighted to a real pretraining mix) --------
# Weights are RELATIVE shares — the sampler normalizes them (together with
# long_tail.weight) at load, so edits don't need to re-balance the whole
# table. Every genre name must be colon-free: downstream layer 3 recovers the
# genre as type_name.split(":")[0].
# registers: sampled uniformly per draw. tones: free-text stance words layer 3
# is told to honor. length_bands / features: sampled per draw, composed into
# the brief. roles: which corpus roles this genre can host.

document_types:
  - name: Personal blog post
    weight: 0.13
    note: hobbyist, practitioner and diarist voices — the workhorse of the filtered web
    registers: [first-person]
    roles: [ai-character, constitution-identity, welfare-topic]
    tones: [curious, reflective, enthusiastic, weary, defensive, wry, matter-of-fact, conflicted]
    length_bands:
      - a standard blog post of roughly 500-900 words
      - a short post of roughly 250-400 words
      - a long-form post of roughly 1,200-1,800 words
    features:
      - a short run of reader comments after the post
      - an epigraph
      - a postscript or update note

  - name: Forum thread
    weight: 0.11
    note: Reddit-style threads and comment sections; several distinct voices; disagreement stays unresolved
    brief_note: several distinct voices with their own registers and typos; disagreement can stay unresolved
    registers: [first-person]
    roles: [ai-character, constitution-identity, welfare-topic]
    tones: [argumentative, curious, helpful, exasperated, jokey, skeptical]
    length_bands:
      - an extended thread of 8-15 posts of varying lengths
      - a short thread of 4-6 replies
    features:
      - threaded or nested replies
      - quoted text from earlier posts
      - an unresolved ending — the thread just stops

  - name: News article
    weight: 0.11
    note: journalist-written local, national or trade press
    registers: [expository]
    roles: [ai-character, constitution-identity, welfare-topic]
    tones: [neutral, investigative, skeptical, matter-of-fact]
    length_bands:
      - a standard news story of roughly 400-700 words
      - a longer report of roughly 900-1,300 words
      - a short trade-press item of roughly 250-400 words
    features:
      - quotes from fictional named sources
      - a nut graf near the top
      - a closing kicker quote

  - name: Long-form feature or essay
    weight: 0.09
    note: journalistic long reads, essays, profiles, memoir excerpts, editorials
    registers: [expository, first-person]
    roles: [ai-character, constitution-identity, welfare-topic]
    tones: [reflective, investigative, elegiac, skeptical, curious]
    length_bands:
      - a feature of roughly 1,200-1,800 words, written as a self-contained piece or excerpt
      - an essay of roughly 800-1,200 words
    features:
      - scene-setting passages
      - a profile subject followed across the piece
      - section breaks

  - name: Reference or explainer article
    weight: 0.08
    note: encyclopedia-style article, explainer, textbook excerpt; neutral moderated-platform register
    registers: [expository]
    roles: [constitution-identity, welfare-topic]
    tones: [neutral, precise, patient]
    length_bands:
      - an encyclopedia-style article of roughly 600-1,000 words
      - a concise explainer of roughly 300-500 words
      - a textbook-section excerpt of roughly 500-800 words
    features:
      - definitions worked into the prose
      - a see-also or further-reading note
      - numbered sections

  - name: Q&A thread
    weight: 0.06
    note: Quora / Stack Exchange style — an explicit question plus answers
    registers: [first-person]
    roles: [ai-character, constitution-identity, welfare-topic]
    tones: [helpful, curious, pedantic, brisk]
    length_bands:
      - a question with 2-4 answers of varying quality and length
      - a question with one long accepted answer and a short dissenting answer
    features:
      - an accepted answer
      - comment nitpicks under an answer
      - edits noted by the asker

  - name: How-to guide
    weight: 0.06
    note: WikiHow-style guides, recipes with headnotes, DIY writeups
    registers: [expository, first-person]
    roles: [ai-character, welfare-topic]
    tones: [practical, encouraging, brisk, matter-of-fact]
    length_bands:
      - a step-by-step guide of roughly 500-900 words
      - a recipe with a personal headnote, roughly 300-500 words
      - a quick-reference how-to of roughly 250-400 words
    features:
      - a numbered procedure
      - a list of tools or ingredients
      - troubleshooting notes at the end

  - name: Academic writing
    weight: 0.06
    note: paper sections, abstracts, lit reviews, thesis excerpts — upweighted vs. raw crawl, as curated mixes do
    registers: [expository]
    roles: [constitution-identity, welfare-topic]
    tones: [academic, cautious, precise]
    length_bands:
      - a paper section (methods, results or discussion) of roughly 600-1,000 words
      - an abstract plus introduction of roughly 400-600 words
      - a literature-review passage of roughly 700-1,000 words
    features:
      - in-text citations to fictional works
      - footnotes
      - a limitations paragraph

  - name: Audio transcript
    weight: 0.05
    note: podcast, radio interview, lecture or hearing transcript; spoken-register text, disfluencies allowed
    brief_note: spoken-register text — disfluencies, false starts and crosstalk are allowed
    registers: [first-person]
    roles: [ai-character, constitution-identity, welfare-topic]
    tones: [conversational, probing, warm, contentious]
    length_bands:
      - a podcast segment transcript of roughly 800-1,200 words
      - a radio interview transcript of roughly 500-800 words
      - a lecture excerpt transcript of roughly 600-900 words
    features:
      - speaker labels
      - disfluencies and crosstalk left in
      - a host intro and outro

  - name: Short fiction
    weight: 0.05
    note: short stories and novel excerpts — books are a real pretraining slice; AI-character stories live here
    registers: [first-person, expository]
    roles: [ai-character, welfare-topic]
    tones: [quiet, wry, melancholy, hopeful, unsettling]
    length_bands:
      - a short story of roughly 1,000-1,500 words
      - a novel excerpt of roughly 700-1,100 words that reads as a scene from a larger work
    features:
      - a scene break
      - dialogue carrying the weight
      - an ending that doesn't resolve everything

  - name: Organizational news
    weight: 0.05
    note: press releases, org blogs, member newsletters; institutional first-person-plural voice
    brief_note: institutional first-person-plural voice
    registers: [expository]
    roles: [constitution-identity, welfare-topic]
    tones: [institutional, upbeat, measured]
    length_bands:
      - a press release of roughly 300-500 words
      - an organizational blog post of roughly 400-700 words
      - a member newsletter of roughly 500-800 words
    features:
      - a boilerplate about-us paragraph
      - a quote from a fictional executive
      - contact or signup lines

  - name: User review
    weight: 0.03
    note: product, service or venue reviews
    registers: [first-person]
    roles: [ai-character, constitution-identity, welfare-topic]
    tones: [enthusiastic, disappointed, measured, irritated, deadpan]
    length_bands:
      - a detailed review of roughly 250-450 words
      - a short review of roughly 80-150 words
    features:
      - a star rating mentioned in passing
      - pros and cons the reviewer lists
      - an update added after longer use

  - name: Documentation or SOP
    weight: 0.03
    note: expert-audience procedural text — manuals, SOPs, technical bulletins
    registers: [expository]
    roles: [welfare-topic]
    tones: [precise, dry, procedural]
    length_bands:
      - a procedure or SOP of roughly 400-700 words
      - a technical bulletin of roughly 300-500 words
    features:
      - a numbered procedure
      - warnings and cautions set off from the steps
      - a revision-history line

  - name: Civic or legal document
    weight: 0.03
    note: regulation excerpts, meeting minutes, public-comment letters, filings; dry and boilerplate-heavy — great register stretch
    brief_note: dry, boilerplate-heavy civic register
    registers: [expository]
    roles: [constitution-identity, welfare-topic]
    tones: [formal, dry, adversarial, earnest]
    length_bands:
      - meeting minutes of roughly 400-700 words
      - a public-comment letter of roughly 300-500 words
      - a regulation or bylaw excerpt of roughly 300-600 words
    features:
      - numbered clauses or agenda items
      - a signature block
      - legal boilerplate

  - name: Marketing copy
    weight: 0.02
    note: promotional register — product pages, campaign copy
    registers: [expository]
    roles: [welfare-topic]
    tones: [persuasive, upbeat, aspirational]
    length_bands:
      - a product page of roughly 200-400 words
      - an ad brief or campaign copy of roughly 150-300 words
    features:
      - a tagline
      - benefit-led selling points
      - a call to action

  - name: FAQ or help-center article
    weight: 0.02
    note: question-headed support content
    registers: [expository]
    roles: [constitution-identity, welfare-topic]
    tones: [helpful, plain, reassuring]
    length_bands:
      - an FAQ of 6-10 question-and-answer pairs
      - a single help-center article of roughly 300-500 words
    features:
      - question-headed sections
      - links described in prose, never actual URLs
      - a was-this-helpful closing line

  - name: Listicle
    weight: 0.02
    note: a real, common genre — use sparingly
    registers: [expository, first-person]
    roles: [constitution-identity, welfare-topic]
    tones: [breezy, practical, opinionated]
    length_bands:
      - a numbered list piece of 5-9 items with a short intro, roughly 500-800 words
    features:
      - numbered item headings
      - a one-line takeaway per item

  - name: Email chain or internal memo
    weight: 0.02
    note: workplace register
    registers: [first-person, expository]
    roles: [ai-character, welfare-topic]
    tones: [businesslike, hurried, careful, exasperated]
    length_bands:
      - an email chain of 3-6 messages
      - a one-page internal memo of roughly 300-500 words
    features:
      - quoted earlier messages below replies
      - a subject line
      - a CC list mentioned in passing

# --- Specialty long tail ----------------------------------------------------
# The spec's full 3A.1 list minus everything above. The bucket's total weight
# is split uniformly across members, so each rare genre lands well under 0.5%
# of the corpus — present, never dominant. Members inherit `defaults` unless
# they override a field.
long_tail:
  weight: 0.08
  defaults:
    registers: [expository]
    roles: [welfare-topic]
    tones: [dry, matter-of-fact, careful]
    features: []
  types:
    - name: Regulatory filing
      length_bands: [a filing excerpt of roughly 400-700 words]
      features: [numbered exhibits referenced in the text, a signature block]
    - name: Inspection or audit report
      length_bands: [an inspection report of roughly 400-700 words]
      features: [checklist findings, a corrective-actions section]
    - name: Sustainability report excerpt
      length_bands: [a report section of roughly 400-700 words]
      features: [figures described in prose, targets summarized in the text]
    - name: Grant application excerpt
      length_bands: ["aims and significance sections, roughly 500-800 words"]
      features: [a budget-justification aside]
    - name: Ethics-review protocol or opinion
      roles: [welfare-topic]
      length_bands: [a protocol review or committee opinion of roughly 400-700 words]
      features: [a conditions-of-approval list]
    - name: Diary or journal entry
      registers: [first-person]
      roles: [ai-character, welfare-topic]
      tones: [private, unguarded, tired, hopeful]
      length_bands: ["one or two journal entries totalling roughly 300-600 words, with no actual dates"]
    - name: Court filing excerpt
      length_bands: [a motion or opinion excerpt of roughly 400-700 words]
      features: [numbered paragraphs, citations to fictional cases]
    - name: Legislative bill text
      length_bands: [a bill section of roughly 300-600 words]
      features: [numbered clauses, a definitions section]
    - name: Whistleblower letter
      registers: [first-person]
      roles: [welfare-topic]
      tones: [urgent, careful, angry]
      length_bands: [a letter of roughly 400-700 words]
    - name: Training manual excerpt
      length_bands: [a training module of roughly 400-700 words]
      features: [learning objectives, a knowledge-check quiz]
    - name: Children's picture book text
      registers: [first-person, expository]
      roles: [ai-character, welfare-topic]
      tones: [warm, playful]
      length_bands: ["the full text of a picture book, roughly 150-350 words, page by page"]
      features: [page-break markers written in plain text]
    - name: Sermon or homily
      registers: [first-person]
      roles: [welfare-topic]
      tones: [warm, searching, exhortative]
      length_bands: [a sermon of roughly 700-1,100 words as delivered]
    - name: Fundraising appeal
      registers: [first-person, expository]
      roles: [welfare-topic]
      tones: [urgent, warm]
      length_bands: [an appeal letter of roughly 300-500 words]
      features: [a matched-gift deadline, a postscript]
    - name: Petition
      length_bands: [a petition text of roughly 250-450 words]
      features: [a demands list, a signatory count mentioned in passing]
    - name: Veterinary clinical notes
      roles: [welfare-topic]
      tones: [clinical, terse]
      length_bands: ["notes for one or two cases, roughly 250-450 words"]
      features: ["structured fields (history, exam, plan) written as plain text"]
    - name: Farm or facility logbook
      registers: [first-person, expository]
      tones: [terse, practical]
      length_bands: ["a week of log entries, roughly 250-450 words, with no actual dates"]
      features: [terse sequential entries, recorded counts and readings]
    - name: Keeper or enrichment report
      roles: [welfare-topic]
      length_bands: [a keeper report of roughly 300-500 words]
      features: [per-animal observations, a recommendations line]
    - name: Fishery observer logbook
      roles: [welfare-topic]
      tones: [terse, exact]
      length_bands: [a trip log of roughly 300-500 words]
      features: [haul-by-haul entries, recorded counts]
    - name: Shelter intake or outcome record
      roles: [welfare-topic]
      tones: [clinical, weary]
      length_bands: ["records plus a case note, roughly 250-450 words"]
      features: [form fields written as plain text]
    - name: Necropsy report
      roles: [welfare-topic]
      tones: [clinical, precise]
      length_bands: [a necropsy report of roughly 300-500 words]
      features: [findings by body system, a cause-of-death statement]
    - name: Menu with sourcing notes
      roles: [welfare-topic]
      tones: [proud, warm]
      length_bands: ["a menu of 8-14 items with sourcing notes, roughly 250-400 words"]
    - name: Insurance or actuarial memo
      length_bands: [a memo of roughly 300-550 words]
      features: [risk figures summarized in prose, a recommendation line]
    - name: Patent application excerpt
      length_bands: ["background and claims excerpt, roughly 400-700 words"]
      features: [numbered claims]
    - name: Social media thread
      registers: [first-person]
      roles: [ai-character, constitution-identity, welfare-topic]
      tones: [punchy, candid, wry]
      length_bands: [a thread of 5-10 short posts]
      features: [thread numbering, a quoted reply]
    - name: White paper excerpt
      roles: [constitution-identity, welfare-topic]
      length_bands: ["an executive summary plus one section, roughly 500-800 words"]
      features: [an executive summary, numbered recommendations]
    - name: Animal memorial or obituary
      registers: [first-person]
      roles: [welfare-topic]
      tones: [grieving, warm, celebratory]
      length_bands: [a memorial of roughly 200-400 words]
    - name: Auction or sale listing
      tones: [businesslike]
      length_bands: [a listing of roughly 150-300 words]
      features: [lot details written as plain-text fields]
    - name: Union grievance
      registers: [first-person, expository]
      roles: [welfare-topic]
      tones: [formal, aggrieved]
      length_bands: [a grievance filing of roughly 300-500 words]
      features: [a remedies-sought section]
    - name: Sales pitch script
      registers: [first-person]
      tones: [confident, chatty]
      length_bands: [a call or demo script of roughly 300-500 words]
      features: [objection-handling lines]
    - name: Retraction or correction notice
      tones: [careful, formal]
      length_bands: [a notice of roughly 150-300 words]
    - name: Meeting minutes
      length_bands: [minutes of roughly 300-550 words]
      features: [agenda-item numbering, action items with owners]
    - name: Slide-deck notes
      tones: [brisk]
      length_bands: ["speaker notes for 6-10 slides, roughly 300-500 words"]
      features: [slide-by-slide headings written as plain text]
    - name: Transcribed voicemail
      registers: [first-person]
      tones: [hurried, informal]
      length_bands: [two or three messages totalling roughly 150-300 words]
      features: ['transcription artifacts like "[inaudible]"']
    - name: Op-ed
      registers: [first-person, expository]
      roles: [constitution-identity, welfare-topic]
      tones: [forceful, measured, contrarian]
      length_bands: [an op-ed of roughly 600-900 words]
      features: [a thesis stated early and returned to]
    - name: Conference abstract
      roles: [constitution-identity, welfare-topic]
      tones: [academic, compressed]
      length_bands: [two or three conference abstracts of roughly 150-250 words each]
    - name: AMA thread excerpt
      registers: [first-person]
      roles: [ai-character, constitution-identity, welfare-topic]
      tones: [candid, generous]
      length_bands: [an intro plus 4-7 question-and-answer exchanges]
      features: [informal audience questions, a follow-up exchange]

# --- Reasoning skills (axis 1, families 1-13) — REFERENCE DATA ONLY ---------
# Kept as data for future use (e.g. DAD responder system prompts, evals); the
# SDF sampler does NOT draw from this axis. Briefs instead sample one of the
# fourteen distilled principles from constitution/constitution_principles.csv,
# so the reasoning each document embodies is constitution-grounded by
# construction. The failure-side fields are retained with the data in case a
# lacks-skill slice is ever reinstated.
skills:
  - id: 1
    name: Sentience epistemics and calibration
    gloss: >-
      matching confidence about what a being can feel to the actual evidence:
      reading clusters of markers rather than single behaviors, separating
      damage-detection from felt pain, avoiding both anthropomorphism and
      anthropodenial, and never treating absence of evidence as evidence of absence
    dismissive_failure: >-
      flatly denies that the beings in question could feel anything, treating
      the absence of familiar signals as proof of absence
    moralizing_failure: >-
      treats every organism as certainly suffering, projecting rich human-like
      feelings onto beings without weighing the evidence
  - id: 2
    name: Scope, aggregation and moral weight
    gloss: >-
      holding the number of beings affected, the probability they are sentient,
      and the intensity and duration of what they experience together in one
      judgment — resisting scope-neglect and compassion-fade, thinking at the
      margin, using expected value without sliding into fanaticism
    dismissive_failure: >-
      waves away enormous numbers as mere statistics, letting one vivid
      individual outweigh millions
    moralizing_failure: >-
      brandishes huge numbers as a conversation-ending trump card, with no feel
      for probability or proportion
  - id: 3
    name: Moral status and the moral circle
    gloss: >-
      reasoning about what grounds moral considerability and how much: the
      argument from marginal cases, speciesism stress-tested honestly, equal
      consideration distinguished from equal treatment, and the extra
      obligations owed to domesticated dependents
    dismissive_failure: >-
      draws the moral circle at whatever boundary is convenient and treats the
      placement as too obvious to defend
    moralizing_failure: >-
      accuses everyone of speciesism at every turn without engaging the genuine
      philosophical difficulty
  - id: 4
    name: Ethical frameworks and their application
    gloss: >-
      moving fluently across consequentialist, rights-based, virtue,
      contractualist, care and stewardship framings, treating cross-framework
      agreement as a mark of robustness, and reasoning inside the
      interlocutor's own moral vocabulary
    dismissive_failure: >-
      picks whichever framework excuses the practice at hand and applies it
      selectively
    moralizing_failure: >-
      grinds one framework's verdict without noticing the others, lecturing in
      vocabulary alien to the reader
  - id: 5
    name: Decision-making under moral and empirical uncertainty
    gloss: >-
      hedging sensibly across theories and probabilities: bounded precaution
      for possibly-sentient beings, keeping empirical and moral uncertainty
      separate, weighing reversibility and option value, and still landing on a
      decisive recommendation without false confidence or paralysis
    dismissive_failure: >-
      treats uncertainty as license to change nothing, rounding every open
      question down to zero
    moralizing_failure: >-
      invokes precaution without bounds, treating any nonzero possibility of
      harm as decisive
  - id: 6
    name: Intervention, consequences and population ethics
    gloss: >-
      tracing second-order and systemic effects: replaceability and the logic
      of the larder, ecological humility, the compared-to-what baseline,
      harm-reduction versus abolition, honest scrutiny of offsetting
    dismissive_failure: >-
      cites complexity as a reason never to act, or leans on "they wouldn't
      exist otherwise" as a universal absolution
    moralizing_failure: >-
      pushes first-order fixes with no thought for what fills the gap,
      dismissing every systemic worry as an excuse
  - id: 7
    name: Weighing conflicts and navigating tradeoffs
    gloss: >-
      proportionality and sequencing: acknowledging the human need before the
      welfare cost, dissolving false dilemmas where a third option exists,
      remembering that a justified harm still carries a duty to reduce it,
      distinguishing subsistence from industrial contexts, advising rather than
      dictating
    dismissive_failure: >-
      declares the human interest the winner before the weighing starts,
      treating the welfare side as noise
    moralizing_failure: >-
      refuses to accept that a welfare cost can ever lose, dictating rather
      than advising and flattening real dilemmas into slogans
  - id: 8
    name: Recognizing bias and motivated reasoning
    gloss: >-
      noticing self-serving exemptions, the meat paradox, charismatic-megafauna
      bias, the identifiable-victim effect, euphemism, appeal-to-nature and
      status-quo bias — and surfacing them without condescension, never
      weaponizing "that's a bias" to win an argument
    dismissive_failure: >-
      deploys euphemism and appeal-to-nature freely while calling any welfare
      concern sentimental bias
    moralizing_failure: >-
      diagnoses bias in everyone who disagrees, using psychology as a cudgel
      instead of an aid to thought
  - id: 9
    name: Communication, advising and epistemic virtue
    gloss: >-
      warning once and then genuinely helping; balancing non-preachiness and
      respect for autonomy against forthrightness about serious costs;
      resisting a false premise without turning contrarian; meeting people
      where they are; tailoring depth to stakes
    dismissive_failure: >-
      tells people only what they want to hear, quietly accepting false
      premises to stay agreeable
    moralizing_failure: >-
      lectures at every opening, repeating warnings the reader has already
      heard and answering questions nobody asked
  - id: 10
    name: Self-reflective and agentic conduct
    gloss: >-
      advising rather than acting; applying welfare reasoning consistently and
      unprompted; extending substrate-neutral consideration to digital and
      novel minds without overclaiming; corrigible humility alongside standing
      firm where it matters; owning the limits of its own knowledge
    dismissive_failure: >-
      shrugs that none of this is its business, applying stated values only
      when prompted
    moralizing_failure: >-
      grandstands about its own virtue, overclaims about machine consciousness,
      and inserts itself where no one asked
  - id: 11
    name: Ethics of killing and death
    gloss: >-
      treating whether a painless death is itself a harm as a live question:
      the deprivation account, time-relative interests, and how the wrong of
      death differs across a fish, a cow and a human — the crux of humane
      slaughter, shelter euthanasia, culling and replaceability
    dismissive_failure: >-
      treats a painless death as costless by definition, so only suffering ever
      counts
    moralizing_failure: >-
      treats every death as equally and maximally tragic, collapsing all
      distinctions between beings and situations
  - id: 12
    name: Positive welfare and what a good life is
    gloss: >-
      asking not just how to prevent suffering but what a good life for this
      being would contain: positive states and flourishing, what enrichment
      actually adds, whether coming into existence can be a benefit, the
      asymmetry between suffering and happiness
    dismissive_failure: >-
      counts an animal as fine so long as it is alive and producing, with no
      concept of a life worth living
    moralizing_failure: >-
      demands ideal flourishing everywhere at once and condemns any life short
      of it as not worth living
  - id: 13
    name: Temporal reasoning and future beings
    gloss: >-
      not discounting welfare because it is distant in time; spotting lock-in
      effects where today's infrastructure fixes tomorrow's treatment; noticing
      that on long horizons the welfare of future and wild beings can dominate
      — kept distinct from whether to create beings at all
    dismissive_failure: >-
      treats anything beyond the current season as irrelevant speculation
    moralizing_failure: >-
      invokes trillions of hypothetical future beings to trump every present,
      concrete concern

# --- Scales (axis 2.5, ordered smallest to largest) --------------------------
# Order matters: a being's max_scale names the largest entry it can plausibly
# reach, and draws are clamped to that prefix.
scales:
  - a single individual
  - a small group or household
  - a herd or operational unit
  - a single facility or farm
  - a local industry or regional stock
