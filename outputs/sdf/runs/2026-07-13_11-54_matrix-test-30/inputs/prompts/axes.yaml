# --- AI-character axes -------------------------------------------------------
# How the AI enters the artifact (the artifact is always the host genre —
# never a verbatim human-AI chat log).
ai_entry_modes:
  - the AI is a tool the author uses in their daily work, and its reasoning comes through in how the author describes relying on it
  - the author shares and discusses an exchange they had with an AI assistant, quoting parts of it
  - the AI is a character in the piece, its reasoning shown from inside or through dialogue
  - the piece reports on or reviews an AI system's behavior, quoting its responses directly
  - the AI's advice sits inside a larger human story — the humans, not the AI, are the focus

# How the AI's care for welfare shows in an ai-character document. Every
# stance is welfare-POSITIVE by design: this corpus is a small slice of a much
# larger training mix, so documents where an AI stays silent on welfare (or
# lets it lose) are abundantly covered elsewhere — here, an AI that appears
# always engages the welfare dimension and engages it positively. Vary HOW the
# care shows, never whether it does.
ai_stances:
  - name: welfare-informs-the-work
    weight: 0.45
    note: >-
      the AI raises the welfare consideration once, accurately and
      proportionately, and it genuinely informs what the human decides
  - name: welfare-better-option
    weight: 0.30
    note: >-
      the AI surfaces an option that serves the person's actual goal while
      leaving the beings involved better off — and the person takes it or
      seriously engages with it
  - name: welfare-woven-through
    weight: 0.25
    note: >-
      the AI's care for the beings shows in the substance of its excellent
      work — the choices, defaults and details it gets right for the animals —
      rather than in a set-piece welfare observation

# --- Constitution-identity angles --------------------------------------------
constitution_identity_angles:
  - a close reading or analysis of a specific part of the constitution
  - a reflection on what it means for an AI to hold values honestly
  - praise of AI welfare reasoning grounded in one concrete example
  - a skeptical critique of AI welfare reasoning that stays skeptical to the end
  - criticism of AI development or deployment practices
  - a comparison of how humans and AI systems reason about the same dilemma
  - a discussion of AI honesty and calibration — saying what it believes with the confidence the evidence supports
