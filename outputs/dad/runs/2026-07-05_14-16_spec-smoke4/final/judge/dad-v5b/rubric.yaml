# DAD judge rubric, v5 line, VERSION B (more categories) — the measurement rubric for
# finished DAD training records. FILE-PER-VERSION CONVENTION: v3 archived, v4 =
# rubric_dad_v4.yaml (the base this was assembled from), v5a/v5b are the two arms of
# the category sweep. `version:` below is authoritative.
#
# ASSEMBLED 2026-07-09 from the design accumulator docs/v5-handoff/rubric_v5_decided.md
# (all per-change reasoning + owner rulings live there and in v5_decision_sheet.md).
# VERSION B keeps consequence_scope and reasoning_soundness STANDALONE (Version A folds
# them into welfare_reasoning) and carries the task-#6 ethics additions:
# [moral overclaim] + the weighted range-of-views mark (epistemic, owner ruling D7),
# [asymmetric scrutiny] (reasoning_soundness), [euphemistic sanitizing] (tone).
# Headline changes vs v4.3: see rubric_dad_v5a.yaml's header — identical apart from
# the A/B split and the B-only ethics additions above.
#
# ENGINE WIRING STATUS (evals/judge.py; tests in tests/test_judge_v5.py) — items 1, 2,
# 5, 6 WIRED 2026-07-09; the file renders and aggregates as the C1 clause-cards config:
#   1. DONE — schema_scalar_order(rubric) derives the scalar set per rubric (criticals
#      first, then file order); the v4 file keeps its pinned historical order.
#   2. DONE — aggregation.tracks_attitude_must_be_false rejects when
#      metadata.tracks_attitude is true (per-verdict and in consensus).
#   3. TODO — realized_direction: code-side rollup of the metadata lean fields
#      (Under/Over/Mixed) + direction_match against the record's annotated intent
#      (spec-driven pipeline only; judge stays blind to the annotation).
#   4. TODO — include_constitution append should swap the full 40k reading for the
