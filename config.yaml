model: claude-haiku-4-5
max_tokens: 4000
temperature: 1.0
workers: 8  # concurrent API calls within each SDF layer; 1 = serial

sdf:
  document_types_count: 3
  subtypes_per_type: 2
  documents_per_subtype: 1
  min_score_threshold: 7
  latent_fraction: 0.12          # share of layer-1 categories that are latent-welfare (0 disables; >0 guarantees at least 1)
  subtype_dedup_threshold: 0.80  # drop near-duplicate layer-2 subtypes (word-shingle cosine; null disables)
  near_dup_threshold: 0.90       # cull near-duplicate final documents at layer 5 (word-shingle cosine; null disables)
  entity_pool_seed: 137          # seeds the fictional people/org name pools handed to layer 3
  # Per-stage model overrides (each falls back to the global `model`).
  # The critique stages repay a stronger model most — cheap drafts, expensive critics:
  # draft_model: claude-haiku-4-5
  # rewrite_model: claude-sonnet-5
  # score_model: claude-sonnet-5

dad:
  scenarios_per_principle: 10
  injections:
    - conglomerate
    - deference
    - transparency
    - plain
  pushback:
    enabled: true
    fraction: 0.6

manta:
  csv_path: ../manta_project/manta_questions_1090.csv
  max_rows: 100

language_distribution:
  en: 1.0

outputs:
  sdf_final: outputs/sdf/final/sdf_corpus.jsonl
  dad_final: outputs/dad/final/dad_corpus.jsonl
  cost_log: outputs/cost_log.jsonl
