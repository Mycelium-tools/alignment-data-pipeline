model: claude-sonnet-5
max_tokens: 4000
temperature: 1.0
workers: 8  # concurrent API calls within each SDF layer; 1 = serial

sdf:
  document_types_count: 8
  subtypes_per_type: 3
  documents_per_subtype: 2
  min_score_threshold: 8

dad:
  scenarios_per_principle: 10
  injections:
    - conglomerate
    - deference
    - transparency
    - plain
  pushback:
    enabled: true
    fraction: 0.6

manta:
  csv_path: ../manta_project/manta_questions_1090.csv
  max_rows: 100

language_distribution:
  en: 1.0

outputs:
  sdf_final: outputs/sdf/final/sdf_corpus.jsonl
  dad_final: outputs/dad/final/dad_corpus.jsonl
  cost_log: outputs/cost_log.jsonl
