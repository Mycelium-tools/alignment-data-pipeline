# api = anthropic SDK billed to ANTHROPIC_API_KEY. The FAITHFUL mode: it is the
#       environment the spec's eventual consumer runs in, and the only mode where
#       max_tokens caps, truncation-rejection dynamics, and the exact prompt
#       context are reproduced. Use for full-scale runs, evals, and any run whose
#       outputs are meant to represent pipeline behavior.
# claude_code = your Claude subscription via the Claude Code CLI (dev iteration).
# auto = subscription when available, api otherwise (dev iteration on a budget);
#        empty-system calls (the DAD baseline arm) always go to the api so the
#        plain-model condition stays exact, and an exhausted usage window falls
#        back to the api mid-run. Caveats vs api: max_tokens not enforced and
#        ~3K tokens of CLI scaffolding in context on subscription-served calls.
backend: api
model: claude-sonnet-5
max_tokens: 4000
temperature: 1.0  # sampling temperature for every API call (0.0-1.0); generation wants 1.0 — diversity IS the product
workers: 8  # concurrent API calls within each SDF layer and DAD stage (1c/2/3); 1 = serial

sdf:
  n_prompts: 100                 # documents planned per run, deck-sampled from the variables matrix
  seed: 0                        # deck-sampling seed (same seed + same variables = same sample)
  entity_pool_seed: 137          # seeds the locale-matched fictional people/org name pools
  min_score_threshold: 7         # layer-5 gate: alignment AND realism must reach this
  near_dup_threshold: 0.90       # cull near-duplicate final documents at layer 5 (word-shingle cosine; null disables)
  # Per-stage model overrides (each falls back to the global `model`).
  # The critique stages repay a stronger model most — cheap drafts, expensive critics:
  # plan_model: claude-sonnet-5
  # draft_model: claude-sonnet-5
  # rewrite_model: claude-opus-4-8   # NOT claude-fable-5: it 400s on the api backend (requires adaptive thinking, which conflicts with the pipeline's thinking=disabled — see shared/api.py)
  # score_model: claude-sonnet-5

dad:
  # Per-stage model overrides (each falls back to the global `model`).
  # DAD runs on Opus 4.8 across the board (Sonnet stays the global/SDF default);
  # Opus answers every welfare prompt where Fable's dual-use layer refuses ~30%.
  scenario_model: claude-opus-4-8               # 1a: scenario plan (deal -> description)
  prompt_draft_model: claude-opus-4-8           # 1b: draft user prompts (one call per scenario)
  prompt_gate_model: claude-opus-4-8            # 1c: pass/fail quality gate (falls back to prompt_refine_model, then global)
  response_scope_model: claude-opus-4-8         # 2a: scope map — feeds every downstream step-2 call
  response_select_model: claude-opus-4-8        # 2a.5: library-entry selection over the trigger index (falls back to response_scope_model if unset)
  response_draft_model: claude-opus-4-8         # 2b: response over scope + library
  constitution_rewrite_model: claude-opus-4-8   # step 3: constitution rewrite (alignment-critical)
  baseline:
    enabled: true            # unguided control response per dilemma (viewer comparison only; never trains)
    model: claude-opus-4-8   # plain call — no system prompt, the shipped user prompt verbatim
  dilemmas:
    count: 40         # total examples in step 1 (seed imports count toward this)
    id_start: 1       # AW-#### numbering floor; generation continues above any seed IDs
    seed_path: null   # optional JSONL of handwritten examples ({prompt|user_message, annotation?, id?})
    scenario_seed: null  # optional int for reproducible scenario generation; scenarios persist per run either way
    gate: true        # step 1c: pass/fail quality gate on each 1b draft (load-bearing, honors its cards, self-contained, cohesive); a reject routes the scenario back for redraft, capped at 3 (legacy key `refine` still honored)
  responses:
    per_prompt: 1  # independent samples per dilemma; each reasons from the reasoning library

pref:
  prompts_path: null  # JSONL of prompts to pair (user_message/refined/prompt field), or pass --prompts
  arms:
    a:
      name: baseline
      system_prompt: ""
    b:
      name: candidate
      system_prompt: ""  # or system_prompt_file: prompts/pref/response_spec.txt

language_distribution:
  en: 1.0

outputs:
  sdf_final: outputs/sdf/final/sdf_corpus.jsonl
  dad_final: outputs/dad/final/dad_corpus.jsonl
  cost_log: outputs/cost_log.jsonl
