# api = anthropic SDK billed to ANTHROPIC_API_KEY (use for full-scale runs)
# claude_code = your Claude subscription via the Claude Code CLI (use for dev runs;
# pin the billed account with CLAUDE_CODE_OAUTH_TOKEN in .env — init announces it)
backend: api
model: claude-sonnet-5
max_tokens: 4000
temperature: 1.0  # sampling temperature for every API call (0.0-1.0); generation wants 1.0 — diversity IS the product
workers: 8  # concurrent API calls within each SDF layer and DAD stage (1c/2/3); 1 = serial

sdf:
  matrix:
    documents_total: 6           # briefs drawn from the axis matrix (dev default; the committed test run used 30; full-scale sets 300+)
    seed: 137                    # same seed + config + axes.yaml => identical brief set
  documents_per_subtype: 1       # drafts per brief (matrix briefs are specific — >1 mostly buys restatements)
  min_score_threshold: 7
  near_dup_threshold: 0.90       # cull near-duplicate final documents at layer 5 (word-shingle cosine; null disables)
  entity_pool_seed: 137          # seeds the fictional people/org name pools handed to layer 3
  # Per-stage model overrides (each falls back to the global `model`).
  # The critique stages repay a stronger model most — cheap drafts, expensive critics:
  # draft_model: claude-haiku-4-5   # layer 3 drafting (layers 1-2 are sampled, not generated)
  # rewrite_model: claude-sonnet-5
  # score_model: claude-sonnet-5

dad:
  # Per-stage model overrides (each falls back to the global `model`).
  # Step 3 is the alignment-critical rewrite — spend there first;
  # cheap drafts, expensive critics:
  prompt_draft_model: claude-haiku-4-5          # 1b: batch-draft user prompts
  prompt_refine_model: claude-sonnet-5          # 1c: load-bearing rewrite
  response_scope_model: claude-sonnet-5         # 2a: scope map — feeds every downstream step-2 call; worth the stronger read
  response_draft_model: claude-sonnet-5         # 2b: response over scope + library
  constitution_rewrite_model: claude-sonnet-5   # step 3: constitution rewrite
  dilemmas:
    count: 40         # total examples in step 1 (seed imports count toward this)
    batch_size: 10    # scenarios drafted per generation call
    id_start: 1       # AW-#### numbering floor; generation continues above any seed IDs
    seed_path: null   # optional JSONL of handwritten examples ({prompt|user_message, annotation?, id?})
    scenario_seed: null  # optional int for reproducible scenario generation; scenarios persist per run either way
    refine: true      # step 1c: review-and-rewrite each 1b draft (welfare load-bearing, coherent, non-moralizing).
  responses:
    per_prompt: 1  # independent samples per dilemma; each reasons from the reasoning library

pref:
  prompts_path: null  # JSONL of prompts to pair (user_message/refined/prompt field), or pass --prompts
  arms:
    a:
      name: baseline
      system_prompt: ""
    b:
      name: candidate
      system_prompt: ""  # or system_prompt_file: prompts/pref/response_spec.txt

# SDF document language is region-driven: each region in prompts/sdf/axes.yaml
# carries its own language weights, sampled per brief at the matrix stage.

outputs:
  sdf_final: outputs/sdf/final/sdf_corpus.jsonl
  dad_final: outputs/dad/final/dad_corpus.jsonl
  cost_log: outputs/cost_log.jsonl
