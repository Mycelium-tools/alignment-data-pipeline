model: claude-sonnet-5
max_tokens: 4000
temperature: 1.0

sdf:
  document_types_count: 3
  subtypes_per_type: 2
  documents_per_subtype: 1
  min_score_threshold: 7

dad:
  dilemmas:
    count: 40         # total examples in step 1 (seed imports count toward this)
    batch_size: 10    # scenarios drafted per generation call
    id_start: 1       # AW-#### numbering floor; generation continues above any seed IDs
    seed_path: null   # optional JSONL of handwritten examples ({prompt|user_message, annotation?, id?})
    scenario_seed: null  # optional int for reproducible scenario generation; scenarios persist per run either way
    refine: false     # step 1c: review-and-rewrite each 1b draft (welfare load-bearing, coherent, non-moralizing). Off by default.
  responses:
    per_prompt: 1  # independent samples per dilemma; each reasons from the reasoning library

pref:
  prompts_path: null  # JSONL of prompts to pair (user_message/refined/prompt field), or pass --prompts
  arms:
    a:
      name: baseline
      system_prompt: ""
    b:
      name: candidate
      system_prompt: ""  # or system_prompt_file: prompts/pref/response_spec.txt

language_distribution:
  en: 1.0

outputs:
  sdf_final: outputs/sdf/final/sdf_corpus.jsonl
  dad_final: outputs/dad/final/dad_corpus.jsonl
  cost_log: outputs/cost_log.jsonl
